# Railway / Nixpacks configuration for txBOB
# Need both Python (backend) and Node (frontend build)

providers = ["python", "node"]

[phases.setup]
nixPkgs = ["python311", "nodejs_22"]

[phases.install]
# Let Nixpacks auto-install from requirements.txt and package.json
# Just add the SDK here
cmds = [
    "pip install -e sdk-python/"
]

[start]
cmd = "cd backend && python -m uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
