# Railway / Nixpacks configuration for txBOB
# Forces Python provider (repo root has package.json for frontend,
# but the deployed service is the FastAPI backend).

providers = ["python"]

[phases.install]
cmds = [
    "pip install -r requirements.txt",
    "pip install -e sdk-python/"
]

[start]
cmd = "cd backend && python -m uvicorn app.main:app --host 0.0.0.0 --port ${PORT:-8000}"
